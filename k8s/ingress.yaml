apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weather-api
  namespace: weather-api
  labels:
    app.kubernetes.io/name: weather-api
  annotations:
    # Force HTTPS — HTTP requests are redirected to HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Rate limiting — 100 requests per minute per client IP
    nginx.ingress.kubernetes.io/limit-rps: "100"
    # Preserve the original client IP for logging / metrics
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    # Request body size limit (adjust if you add file-upload endpoints)
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - weather-api.example.com   # replace with your actual domain
      secretName: weather-api-tls   # must be a TLS Secret in the same namespace
  rules:
    - host: weather-api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: weather-api
                port:
                  name: http
