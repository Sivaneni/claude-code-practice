apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-api
  namespace: weather-api
  labels:
    app.kubernetes.io/name: weather-api
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: weather-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # one extra pod during rollout
      maxUnavailable: 0  # never drop below desired replica count
  template:
    metadata:
      labels:
        app.kubernetes.io/name: weather-api
        app.kubernetes.io/version: "1.0.0"
      annotations:
        # Prometheus pod scraping (used when Prometheus Operator is NOT installed)
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: weather-api
      automountServiceAccountToken: false

      # ---------------------------------------------------------------------------
      # Pod-level security: run everything as non-root
      # ---------------------------------------------------------------------------
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      # ---------------------------------------------------------------------------
      # Spread pods across nodes to survive a single-node failure
      # ---------------------------------------------------------------------------
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: weather-api

      # Prefer nodes that don't already run a weather-api pod
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: weather-api
                topologyKey: kubernetes.io/hostname

      terminationGracePeriodSeconds: 30

      containers:
        - name: weather-api
          image: weather-api:1.0.0   # replace with your registry path
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          # ---------------------------------------------------------------------------
          # Environment — sensitive values from Secret, config from ConfigMap
          # ---------------------------------------------------------------------------
          env:
            - name: OPENWEATHER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: weather-api-secrets
                  key: OPENWEATHER_API_KEY
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: weather-api-secrets
                  key: JWT_SECRET_KEY
          envFrom:
            - configMapRef:
                name: weather-api-config

          # ---------------------------------------------------------------------------
          # Resource guardrails
          # ---------------------------------------------------------------------------
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # ---------------------------------------------------------------------------
          # Probes
          # startupProbe  : gives the container up to 60 s to initialise before
          #                 liveness kicks in (avoids premature restarts on slow starts)
          # readinessProbe: gates traffic — pod is removed from Service endpoints
          #                 while unhealthy
          # livenessProbe : restarts the container if it becomes permanently stuck
          # ---------------------------------------------------------------------------
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 12   # 12 × 5 s = 60 s startup budget
            timeoutSeconds: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          # ---------------------------------------------------------------------------
          # Container-level security hardening
          # ---------------------------------------------------------------------------
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # /tmp is the only directory uvicorn may need to write to
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
