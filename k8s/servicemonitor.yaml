# ---------------------------------------------------------------------------
# ServiceMonitor — requires the Prometheus Operator (kube-prometheus-stack).
# If you use plain Prometheus, use the prometheus.io/* pod annotations in
# deployment.yaml instead and remove this file.
# ---------------------------------------------------------------------------
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: weather-api
  namespace: weather-api
  labels:
    app.kubernetes.io/name: weather-api
    # This label must match the Prometheus Operator's serviceMonitorSelector
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: weather-api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
