# ---------------------------------------------------------------------------
# SECRET TEMPLATE — do NOT commit real values to version control.
#
# In production inject secrets via:
#   • External Secrets Operator  (AWS Secrets Manager / Vault / GCP Secret Manager)
#   • Sealed Secrets (Bitnami)
#   • Helm --set or CI pipeline environment substitution
#
# To create manually for local testing:
#   kubectl create secret generic weather-api-secrets \
#     --namespace weather-api \
#     --from-literal=OPENWEATHER_API_KEY=<your-key> \
#     --from-literal=JWT_SECRET_KEY=<strong-random-secret>
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: weather-api-secrets
  namespace: weather-api
  labels:
    app.kubernetes.io/name: weather-api
type: Opaque
stringData:
  OPENWEATHER_API_KEY: "REPLACE_ME"
  JWT_SECRET_KEY: "REPLACE_ME"
