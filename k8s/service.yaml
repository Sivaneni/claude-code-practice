apiVersion: v1
kind: Service
metadata:
  name: weather-api
  namespace: weather-api
  labels:
    app.kubernetes.io/name: weather-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: weather-api
  ports:
    - name: http
      port: 80
      targetPort: http    # references the named port on the Pod
      protocol: TCP
