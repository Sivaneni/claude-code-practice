apiVersion: v1
kind: ConfigMap
metadata:
  name: weather-api-config
  namespace: weather-api
  labels:
    app.kubernetes.io/name: weather-api
data:
  # JWT token validity window (minutes)
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  # Application log level — INFO in production; DEBUG when troubleshooting
  LOG_LEVEL: "INFO"
